name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install ffmpeg
        shell: powershell
        run: |
          if (Get-Command ffmpeg -ErrorAction SilentlyContinue) {
            ffmpeg -version | Select-Object -First 1
            exit 0
          }
          for ($attempt = 1; $attempt -le 3; $attempt++) {
            choco install ffmpeg -y --no-progress
            if ($LASTEXITCODE -eq 0) { break }
            if ($attempt -eq 3) { exit $LASTEXITCODE }
            Start-Sleep -Seconds (10 * $attempt)
          }
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-mcp.txt "pytest>=8,<9"
      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest

  build-windows:
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ffmpeg
        shell: powershell
        run: |
          if (Get-Command ffmpeg -ErrorAction SilentlyContinue) {
            ffmpeg -version | Select-Object -First 1
            exit 0
          }
          for ($attempt = 1; $attempt -le 3; $attempt++) {
            choco install ffmpeg -y --no-progress
            if ($LASTEXITCODE -eq 0) { break }
            if ($attempt -eq 3) { exit $LASTEXITCODE }
            Start-Sleep -Seconds (10 * $attempt)
          }
      - name: Install build dependencies
        run: python -m pip install -r requirements-cloud.txt -r requirements-local.txt -r requirements-translation.txt -r requirements-dev.txt
      - name: Build Windows application
        shell: powershell
        run: .\build.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: Echovault-Windows
          path: dist/Echovault
