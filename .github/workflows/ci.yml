name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install ffmpeg
        run: choco install ffmpeg -y --no-progress
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-mcp.txt "pytest>=8,<9"
      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest

  build-windows:
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ffmpeg
        run: choco install ffmpeg -y --no-progress
      - name: Install build dependencies
        run: python -m pip install -r requirements-cloud.txt -r requirements-local.txt -r requirements-translation.txt -r requirements-dev.txt
      - name: Build Windows application
        shell: powershell
        run: .\build.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: Echovault-Windows
          path: dist/Echovault
